<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CodeLoot Admin Dashboard</title>
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <div class="auth-check" id="auth-check">
        <div style="text-align: center;">
            <p style="color: var(--muted);">Checking authentication...</p>
        </div>
    </div>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true" tabindex="-1">

    <div class="admin-layout">
        <label for="nav-toggle" class="sidebar-scrim" aria-label="Close menu"></label>

        <aside class="admin-sidebar" aria-label="Admin navigation">
            <label for="nav-toggle" class="sidebar-close" aria-label="Close menu" title="Close menu">×</label>
            <div class="sidebar-brand">
                <span class="brand-mark">CL</span>
                <span class="brand-name">CodeLoot Admin</span>
            </div>
            <ul class="admin-nav">
                <li><a href="#" class="active">Games</a></li>
                <li><a href="#" id="logout-btn" class="nav-logout">Logout</a></li>
            </ul>
            <p class="sidebar-note">
                Save automatically publishes game pages, homepage cards, images, and search — no manual steps.
            </p>
        </aside>

        <div class="admin-content">
            <header class="mobile-topbar" aria-label="Mobile header">
                <label for="nav-toggle" class="btn-icon" aria-label="Open menu" title="Menu">☰</label>
                <span class="brand-mark" style="width:32px;height:32px;font-size:0.8rem;">CL</span>
                <span class="brand-name">Games</span>
            </header>

            <main class="admin-main">
                <div class="admin-header">
                    <h1>Games Management</h1>
                    <div class="header-meta">
                        <div id="sync-status"></div>
                    </div>
                </div>

                <div class="games-toolbar">
                    <div class="search-bar">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <circle cx="11" cy="11" r="7"></circle>
                            <path d="M20 20l-3-3"></path>
                        </svg>
                        <input type="search" id="search-games" placeholder="Search by name, slug, or description…" autocomplete="off">
                    </div>
                    <div class="toolbar-actions">
                        <button class="btn btn-secondary" id="import-games-btn" type="button">Reload from Data</button>
                        <button class="btn btn-primary" id="add-game-btn" type="button">+ Add Game</button>
                    </div>
                </div>

                <div class="table-scroll">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Slug</th>
                                    <th>Category</th>
                                    <th>Codes</th>
                                    <th>Status</th>
                                    <th>Featured</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="games-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal" id="game-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Add Game</h2>
                <button class="btn btn-ghost" type="button" id="close-modal" aria-label="Close">✕</button>
            </div>
            <form id="game-form">
                <input type="hidden" id="game-id">

                <div class="form-row">
                    <div class="form-group">
                        <label for="game-name">Game Name *</label>
                        <input type="text" id="game-name" required>
                    </div>
                    <div class="form-group">
                        <label for="game-slug">Slug (URL) *</label>
                        <input type="text" id="game-slug" required placeholder="blox-fruits">
                    </div>
                </div>

                <div class="form-group">
                    <label for="game-short-description">Short Description (homepage card) *</label>
                    <textarea id="game-short-description" required rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label for="game-long-description">Long Description (game page banner) *</label>
                    <textarea id="game-long-description" required rows="3"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="game-category">Category</label>
                        <select id="game-category">
                            <option value="anime">Anime Games</option>
                            <option value="pvp">PvP Games</option>
                            <option value="rng">RNG / Simulator Games</option>
                            <option value="horror">Horror / Survival Games</option>
                            <option value="general">General</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="game-reward-label">Reward Label (stats card)</label>
                        <input type="text" id="game-reward-label" placeholder="2x XP">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="game-update-date">Last Checked Date</label>
                        <input type="text" id="game-update-date" placeholder="May 20, 2026">
                    </div>
                    <div class="form-group checkbox-group" style="align-self: end;">
                        <input type="checkbox" id="game-featured">
                        <label for="game-featured">Featured on homepage</label>
                    </div>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="game-active" checked>
                    <label for="game-active">Active (live on site)</label>
                </div>

                <div class="form-group">
                    <label for="game-update-info">Update Info (sidebar note)</label>
                    <textarea id="game-update-info" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label for="game-redeem">Redeem Instructions (one step per line)</label>
                    <textarea id="game-redeem" rows="4" placeholder="Open the game on Roblox.&#10;Open Settings → Redeem Codes.&#10;Paste the code exactly as shown."></textarea>
                </div>

                <div class="editor-section">
                    <h3>Game Image</h3>
                    <div class="form-group">
                        <label for="game-image">Upload banner image (PNG/JPG/WebP)</label>
                        <input type="file" id="game-image" accept="image/png,image/jpeg,image/webp,image/gif">
                        <img id="image-preview" class="image-preview" alt="" hidden>
                    </div>
                </div>

                <div class="editor-section codes-editor">
                    <div class="codes-editor-header">
                        <h3>Codes &amp; Rewards</h3>
                        <button type="button" class="btn btn-primary" id="add-code-row-btn">+ Add Code</button>
                    </div>
                    <div id="codes-editor-list"></div>
                    <div class="form-group" style="margin-top:16px;">
                        <label for="bulk-codes">Bulk add (one per line: CODE|Reward)</label>
                        <textarea id="bulk-codes" rows="4" placeholder="FREECODE|100 Gems&#10;UPDATE2026|2x EXP"></textarea>
                    </div>
                </div>

                <div class="modal-footer">
                    <span class="save-status" id="save-status" hidden></span>
                    <button type="button" class="btn btn-secondary" id="cancel-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-game-btn">Save &amp; Publish</button>
                </div>
            </form>
        </div>
    </div>

    <script src="codeloot-data.js?v=deploy-sync-20260521"></script>
    <script src="cms-api.js?v=deploy-sync-20260521"></script>
    <script src="admin.js?v=deploy-sync-20260521"></script>
</body>
</html>
