<!DOCTYPE html>
<html lang="en">
<head>

<body data-site-root=".." data-game-slug="type-soul">
    <header class="site-header">

                <span class="brand-mark">CL</span>
                <span class="brand-name">CodeLoot</span>
            </a>
            <form class="site-search" role="search" data-site-search>

    <main>
